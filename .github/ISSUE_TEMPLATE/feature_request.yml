name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Please describe your feature request below.
  - type: textarea
    id: problem
    attributes:
      label: Related Problem
      description: Describe the problem this feature solves or enhancement it brings.
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the desired feature or behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Mention any alternative solutions considered.
