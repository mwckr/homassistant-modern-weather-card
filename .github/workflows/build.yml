name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Typecheck and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Verify committed dist is up to date
        # intent-to-add makes untracked dist files visible to git diff, so
        # this fails on a missing/uncommitted bundle instead of passing silently
        run: |
          git add --intent-to-add dist
          git diff --exit-code dist/

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: plugin
